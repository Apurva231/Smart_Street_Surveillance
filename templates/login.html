<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Smart Surveillance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
  <!-- templates/partials/header.html -->
<header class="site-header">
    <div class="container">
        <h1>Smart Street Surveillance</h1>
        <p class="tagline">Women's Safety Monitoring System</p>
    </div>
</header>

  <div class="login-wrapper">
    <div class="login-box">
      <h2>🔐 Authority Login</h2>
      <form method="POST" action="/login">
        <div class="input-group">
          <label for="username">Username</label>
          <input type="text" name="username" id="username" placeholder="Enter username" required>
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" name="password" id="password" placeholder="Enter password" required>
        </div>
        {% if error %}
          <p class="error">{{ error }}</p>
        {% endif %}
        <button type="submit">Login</button>
      </form>

    </div>
  </div>
  <!-- templates/partials/footer.html -->
<footer class="site-footer" style="background-color: #1f3246;">
    <div class="container">
        <p>&copy; {{ now().year }} Smart Surveillance | All rights reserved.</p>
    </div>
</footer>

</body>
</html>
